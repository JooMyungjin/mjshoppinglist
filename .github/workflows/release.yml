name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('files/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release notes from commit messages
        id: notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          # 이전 태그 이후 커밋 메시지 수집 (없으면 전체)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi

          # 릴리즈 노트 작성
          NOTES="## 업데이트 내용"$'\n'"$COMMITS"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Zip files folder
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p mj-shopping-list-v${VERSION}
          cp -r files mj-shopping-list-v${VERSION}/files
          zip -r mj-shopping-list-v${VERSION}.zip mj-shopping-list-v${VERSION}/ -x "*.DS_Store"

      - name: Create Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: mj-shopping-list-v${{ steps.version.outputs.version }}.zip
